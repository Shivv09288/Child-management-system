{% extends "base.html" %}

{% block title %}Health Records - Child Management System{% endblock %}

{% block content %}
<div class="health-container">
    <h1>Health Records</h1>

    {% if children %}
    <form id="healthForm" class="form">
        <div class="form-group">
            <label for="child_id">Select Child *</label>
            <select id="child_id" name="child_id" required onchange="loadHealthRecords()">
                <option value="">-- Select a child --</option>
                {% for child in children %}
                <option value="{{ child._id }}">{{ child.name }} (Age: {{ child.age }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="record_type">Record Type *</label>
                <select id="record_type" name="record_type" required>
                    <option value="">Select Type</option>
                    <option value="Vaccination">Vaccination</option>
                    <option value="Medical Checkup">Medical Checkup</option>
                    <option value="Dental">Dental</option>
                    <option value="Eye Exam">Eye Exam</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="date">Date *</label>
                <input type="date" id="date" name="date" required>
            </div>
        </div>

        <div class="form-group">
            <label for="description">Description *</label>
            <textarea id="description" name="description" rows="3" required placeholder="Details about the health record..."></textarea>
        </div>

        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="2" placeholder="Additional notes..."></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Add Health Record</button>
    </form>

    <div class="alert-container">
        <div id="message"></div>
    </div>

    <div id="healthRecords" class="health-records">
        <h2>Health History</h2>
        <div id="recordsTable"></div>
    </div>
    {% else %}
    <div class="empty-state">
        <p>Please add a child first to add health records.</p>
        <a href="{{ url_for('add_child') }}" class="btn btn-primary">Add Child</a>
    </div>
    {% endif %}
</div>

<script>
    // Set today's date as default
    document.getElementById('date').valueAsDate = new Date();

    document.getElementById('healthForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const messageDiv = document.getElementById('message');

        const child_id = document.getElementById('child_id').value;
        const record_type = document.getElementById('record_type').value;
        const date = document.getElementById('date').value;
        const description = document.getElementById('description').value;
        const notes = document.getElementById('notes').value;

        try {
            const response = await fetch('/health-records', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ child_id, record_type, date, description, notes })
            });

            const data = await response.json();

            if (response.ok) {
                messageDiv.className = 'alert alert-success';
                messageDiv.textContent = data.message;
                document.getElementById('healthForm').reset();
                document.getElementById('date').valueAsDate = new Date();
                setTimeout(() => loadHealthRecords(), 1000);
            } else {
                messageDiv.className = 'alert alert-error';
                messageDiv.textContent = data.message;
            }
        } catch (error) {
            messageDiv.className = 'alert alert-error';
            messageDiv.textContent = 'An error occurred.';
        }
    });

    async function loadHealthRecords() {
        const childId = document.getElementById('child_id').value;
        if (!childId) {
            document.getElementById('recordsTable').innerHTML = '';
            return;
        }

        try {
            const response = await fetch(`/api/health/${childId}`);
            const data = await response.json();

            if (data.success && data.records.length > 0) {
                let table = '<table class="table"><thead><tr><th>Type</th><th>Date</th><th>Description</th><th>Notes</th></tr></thead><tbody>';
                data.records.forEach(record => {
                    table += `<tr><td>${record.record_type}</td><td>${record.date}</td><td>${record.description}</td><td>${record.notes || '-'}</td></tr>`;
                });
                table += '</tbody></table>';
                document.getElementById('recordsTable').innerHTML = table;
            } else {
                document.getElementById('recordsTable').innerHTML = '<p>No health records found.</p>';
            }
        } catch (error) {
            document.getElementById('recordsTable').innerHTML = '<p>Error loading records.</p>';
        }
    }
</script>
{% endblock %}
