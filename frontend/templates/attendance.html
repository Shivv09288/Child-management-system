{% extends "base.html" %}

{% block title %}Attendance - Child Management System{% endblock %}

{% block content %}
<div class="attendance-container">
    <h1>Mark Attendance</h1>

    {% if children %}
    <form id="attendanceForm" class="form">
        <div class="form-group">
            <label for="child_id">Select Child *</label>
            <select id="child_id" name="child_id" required onchange="loadAttendance()">
                <option value="">-- Select a child --</option>
                {% for child in children %}
                <option value="{{ child._id }}">{{ child.name }} (Age: {{ child.age }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="date">Date *</label>
                <input type="date" id="date" name="date" required>
            </div>

            <div class="form-group">
                <label for="status">Status *</label>
                <select id="status" name="status" required>
                    <option value="">Select Status</option>
                    <option value="Present">Present</option>
                    <option value="Absent">Absent</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="remarks">Remarks</label>
            <textarea id="remarks" name="remarks" rows="3" placeholder="Any additional notes..."></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Mark Attendance</button>
    </form>

    <div class="alert-container">
        <div id="message"></div>
    </div>

    <div id="attendanceRecords" class="attendance-records">
        <h2>Attendance History</h2>
        <div id="recordsTable"></div>
    </div>
    {% else %}
    <div class="empty-state">
        <p>Please add a child first to mark attendance.</p>
        <a href="{{ url_for('add_child') }}" class="btn btn-primary">Add Child</a>
    </div>
    {% endif %}
</div>

<script>
    // Set today's date as default
    document.getElementById('date').valueAsDate = new Date();

    document.getElementById('attendanceForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const messageDiv = document.getElementById('message');

        const child_id = document.getElementById('child_id').value;
        const date = document.getElementById('date').value;
        const status = document.getElementById('status').value;
        const remarks = document.getElementById('remarks').value;

        try {
            const response = await fetch('/attendance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ child_id, date, status, remarks })
            });

            const data = await response.json();

            if (response.ok) {
                messageDiv.className = 'alert alert-success';
                messageDiv.textContent = data.message;
                document.getElementById('attendanceForm').reset();
                document.getElementById('date').valueAsDate = new Date();
                setTimeout(() => loadAttendance(), 1000);
            } else {
                messageDiv.className = 'alert alert-error';
                messageDiv.textContent = data.message;
            }
        } catch (error) {
            messageDiv.className = 'alert alert-error';
            messageDiv.textContent = 'An error occurred.';
        }
    });

    async function loadAttendance() {
        const childId = document.getElementById('child_id').value;
        if (!childId) {
            document.getElementById('recordsTable').innerHTML = '';
            return;
        }

        try {
            const response = await fetch(`/api/attendance/${childId}`);
            const data = await response.json();

            if (data.success && data.records.length > 0) {
                let table = '<table class="table"><thead><tr><th>Date</th><th>Status</th><th>Remarks</th></tr></thead><tbody>';
                data.records.forEach(record => {
                    table += `<tr><td>${record.date}</td><td><span class="status ${record.status.toLowerCase()}">${record.status}</span></td><td>${record.remarks}</td></tr>`;
                });
                table += '</tbody></table>';
                document.getElementById('recordsTable').innerHTML = table;
            } else {
                document.getElementById('recordsTable').innerHTML = '<p>No attendance records found.</p>';
            }
        } catch (error) {
            document.getElementById('recordsTable').innerHTML = '<p>Error loading records.</p>';
        }
    }
</script>
{% endblock %}
